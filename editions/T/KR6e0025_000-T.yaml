body:
  text: 華嚴經骨目序此經新本大唐證聖元年于闐實叉難陀譯八十卷成天台宗教第九祖師荊溪尊者有願行觀門骨目一卷今分兩卷即略撮綱要用擬觀本斯文久流他國未行于中朝故人罕得而見之然諸佛密藏如來性海視之者莫識其指歸挹之者罔測其涯際倘留神此典實玄覽要門洞明諸佛果源開悟眾生理本無邊剎海豈隔毫端十世古今不逾當念法界大都於茲入矣則與夫看誦華嚴大教一部校量功德復何有異焉敬敘元由以冠經首庶知其所自云耳
