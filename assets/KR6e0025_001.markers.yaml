  - {type: variant, offset: 4193, length: 295, content: 偈云：「菩薩在家，當願眾生下二十一偈第二句同，知家性空，免其逼迫。孝事父母，善事於佛，護養一切。妻子集會，怨親平等，永離貪著。若得五欲，拔除欲箭，究竟安隱。伎樂聚會，以法自娛，了伎非實。結跏趺坐，善根堅固，得不動地。若舉於足，出生死海，具眾善法。整衣束帶，檢束善根，不令散失。大小便時，棄貪瞋癡，蠲除罪法。洗滌形穢，清淨調柔，畢竟無垢。以水洗面，得淨法門，永無垢染。見修園圃，五欲圃中，耘除愛草。見歡樂人，常得安樂，樂供養佛。見苦樂人，獲根本智，滅除眾苦。見疾病人，知身空寂，離乖諍法。若見沙門，調柔寂靜，畢竟第一。若飯食時，禪悅為食，法喜充滿。洗浴身體，身心無垢，內外光潔。盛暑炎毒，捨離眾惱，一切皆盡。若洗足時，具神足力，所行無礙。以時寢息，身得安隱，心無動亂。睡眠始寤，一切智覺，周顧十方。若諸菩薩，如是用心，則獲一切，勝妙功德。」, 甲: ''}
