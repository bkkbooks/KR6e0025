  - {type: variant, offset: 7954, length: 116, content: 三無違逆行，安住佛法，了身空寂無我我所，若苦若樂皆無所有，攝受眾生，趣向涅槃。四無屈撓行，修諸精進，於一切世界中，令諸眾生究竟涅槃。五離癡亂行，成就正念，最上清淨善知音聲，生住滅相心不惑亂，三昧增廣。六善現行，能知三業皆無所有，善巧方便現無生相，成熟調伏教化眾生。十行品, 甲: 盡第六行}
