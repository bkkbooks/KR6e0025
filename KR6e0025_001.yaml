body:
  text: 第一會菩提場中說經六品十一卷世主妙嚴品第一此經共有三十九品唯阿僧祇品如來隨好光明功德品是佛自說餘皆加諸菩薩說佛在摩竭提國阿蘭若法菩提場中始成正覺又云佛神力故令此道場一切莊嚴悉於中現曰既異壽量久成不同阿含菩提樹下任運在迹別圓教也又云諸佛神力所加一念之頃悉包法界曰加異自力亦在教道又云於一切法成最正覺智入三世身滿世間遍一切土列衆中十佛世界微塵菩薩圍繞皆是如來共集善根諸雜衆皆云成就大願具菩薩行等一一皆云有佛世界微塵數或云不可思議數無量數等各得諸佛不思議解脫法門盡第五卷如來現相品二卷六欲說勝法先現勝相相依理成還為理表故先現之作理標幟諸菩薩及一切世間主作是思惟云何諸佛地境界加持所行力無所畏三昧無能攝取眼耳鼻舌身意光聲一一皆有云何諸佛字頌中云佛眼云何無有量等佛知其念面門齒間放光光中說偈十方菩薩皆悉來集諸菩薩光中說偈云即以利益諸衆生而為自行清淨業又云一一塵中無量身復現種種莊嚴剎三世所有一切剎一剎那中悉能現又如來白毫相中有菩薩而說偈曰佛身充滿於法界普現一切衆生前隨緣赴感靡不周而恆處此菩提座如來一一毛孔中一切剎塵諸佛坐菩薩衆會共圍繞演說普賢之勝行此品只是具明如來相好以一具多以正攝依普賢三昧品三卷七為述相由故入藏身指因表果明相有在爾時普賢而於佛前坐師子座承佛神力入于三昧名一切諸佛毗盧如來藏身普入一切佛平等性同於虛空法界海出一切諸三昧法普能包納十方法界三世諸佛智光明海皆從此生含藏一切佛力解脫諸菩薩智能令一切國土微塵普能容受無邊法界如此普賢十方虛空法界亦然佛眼所見佛力能到佛身所現一切國土所有微塵一一塵中有世界海微塵數佛剎一一剎中有世界海微塵數佛一一佛前有佛剎微塵數普賢菩薩皆入此三昧一一普賢皆有十方諸佛而現其前同聲讚云一切諸佛共加於汝十方諸佛同時摩頂爾時普賢從三昧起即是從十種三昧門起第五從一切衆生舍宅三昧門起偈云所現國土皆嚴淨一剎那中見多劫普賢安住一切剎所現神通勝無比世界成就品四卷同既具能化必有所被故示所見為所化境爾時普賢以佛神力遍觀察一切世界海衆生海諸佛海衆生業海根欲海佛法輪海一切三世海願力海神變海觀已告諸菩薩佛知一切世界海成壞清淨智不可思議乃至神變海智不可思議遍歷一切頌云一切剎土入我身所住諸佛亦復然普賢行願無邊際我已修行得具足普賢又告諸菩薩言三世諸佛說世界海有十種事所謂世界海起具因緣所依住形狀體性莊嚴清淨佛出興劫住劫轉變差別無差別門具如初句若廣說者與世界海微塵數等又有十因緣故已成當成現成所謂佛神力故法應如是故衆生業故菩薩智故衆生菩薩同集善根故菩薩嚴淨佛土願力故菩薩成就不退行願故菩薩清淨勝解自在故如來善根所流及諸佛成道時自在勢力故普賢自在願力故廣說亦有世界海微塵數頌云一一身包一切剎一念普現於三世佛以方便悉入中此是毗盧所嚴淨又云有種種所依形相體乃至差別門華藏世界品五卷八九十雖示所化正報之人須知依報所現之土普賢告大衆言此華藏世界海是毗盧遮那如來昔於世界海劫修菩薩行時一一劫中親近世界海微塵數佛一一佛所淨修世界海微塵數大願嚴淨世界須彌山塵數風輪持頌云華藏世界所有塵一一塵中見法界寶光現佛如雲集此是如來剎自在又有世界海大輪圍山山中有地皆金剛所成衆寶莊嚴此世界海大地中有不可說佛剎微塵數香水海衆寶莊嚴底岸等一一香水海各有四天下微塵數香水河衆寶摩尼以為岸等諸佛因行皆現其中一一河各有世界塵數莊嚴此華藏世界海皆以世界海微塵數清淨功德之所莊嚴又此不可說佛剎微塵數香水海中有不可說剎微塵世界種安住一一種有不可說佛剎微塵世界於世界海中依住形狀等不同頌云十方所有廣大剎悉來入此世界種雖現十方普入中而實無來無所入以一剎種入一切一切入一亦無餘體相如本無差別無等無量悉周遍一切國土微塵中普見如來在其所此香水海在華藏中如天帝網分布而住最中者名無邊妙華光香水海如是十方各以二十重佛剎微塵世界圍繞頌曰華藏世界海法界等無別莊嚴極清淨安住於虛空毗盧遮那品六卷十一既其通示能所依正仍須別辨一方偏迹舉偏知圓示別識總普賢菩薩告大衆言乃往古世過世界微塵劫復倍是數有世界海名普門光明此世界海中有世界名勝音依摩尼華海住須彌山微塵數世界而為眷屬其形正圓其地無量莊嚴三百重寶圍繞寶雲覆上如須彌山衣服飲食隨念而至彼勝音世界中有香水海名清淨光明中有大蓮華須彌山出現名華焰普莊嚴幢山上有林名摩尼華衆寶莊嚴百萬億那由他城周匝圍繞種種衆生於中止住林東有城名焰光明人王所都百萬億那由他城周匝圍繞彼勝音世界最初劫中有十須彌山微塵數如來出興第一佛名一切功德山須彌勝雲王名喜見善慧統領百萬億那由他城夫人婇女三萬七千王子五百大威光為首有十千夫人太子見光以昔所修善根力故證十種法門已說偈以佛神力其聲遍滿勝音世界其王聞已與夫人俱來至佛所八部眷屬皆悉來集聞法獲益大威光得無量智光明佛滅後有波羅蜜善根莊嚴佛出世爾時大威光童子見佛即得念佛三昧名無邊海藏門等十千法門值第三第四佛獲益已還歸本處已上從普賢三昧來皆普賢菩薩說第二會普光明殿說六品四卷如來名號品七卷十二雖知一方偏示之別理須遍達十方之別菩提場中始成正覺於普光明殿坐蓮華藏師子之座妙悟皆滿與十佛剎微塵數菩薩俱皆一生補處悉從他方而來集此為令衆生永斷一切煩惱故說十住十行十向十藏十地十願十定十通十頂及說如來地境界神力所行力無畏三昧神通自在無礙眼耳鼻舌身意辨才智慧勝願皆云如來爾時世尊知諸菩薩心之所念現神通已各於十方過十佛剎微塵數世界各有一世界佛與十佛剎微塵菩薩俱來佛所東方世界名金色上首菩薩名文殊乘佛威力觀諸菩薩而作是言諸佛子佛國土佛住佛剎莊嚴佛法性佛剎清淨佛說法佛出現佛剎成就佛菩提皆不可思議何以故佛於十方知諸衆生隨其所應說法調伏如來於此娑婆諸四天下種種身名色相修短壽量處所諸根生處諸業觀察皆云種種皆令衆生所見不同如來於此四天下中或名一切義成或名圓滿月或名釋迦牟尼毗盧遮那等十千名號如是四天下十方各一世界各十千名此娑婆世界百億四天下有百億萬種種名又於娑婆外十方各有一世界各有百億萬種種名號十方盡虛空界種種不同四聖諦品八卷同既了別人應知別法爾時文殊師利菩薩告諸菩薩諸佛子苦聖諦此娑婆世界中或名罪或名逼迫或名變異攀緣聚剌等集聖諦或名繫縛滅壞愛著義妄覺念等滅聖諦或名無諍離塵寂靜等道聖諦或名一乘趣寂導引等如是十方世界一一各有四百億十千名號光明覺品九卷十三欲宣其法先動其情橫滿虛空豎窮色頂明其人法所被分齊爾時世尊足下放光照百億四天下乃至百億色究竟天佛神力故皆見如來十佛剎微塵數菩薩圍繞十方各一大菩薩各與十佛剎微塵數菩薩俱文殊師利為首爾時一切處文殊師利各於佛前同時說偈爾時光明過此世界十方各十佛剎微塵數世界各有四天下乃至色究竟一切處文殊說偈亦然盡法界虛空界亦如是菩薩問明品十卷同欲破無明先啓其萌能問所問俱是大人故云菩薩衆位之初故首為稱爾時文殊問覺首菩薩言佛子心性是一云何種種差別所謂善趣惡趣諸根滿缺受生同異端醜苦樂心不知業業不知心受不知報報不知受心不知受受不知心因不知緣緣不知因智不知境境不知智覺首答曰諸法無作用亦無有體性是故彼一切各各不相知譬如河中水湍流競奔逝各各不相知諸法亦如是眼耳鼻舌身心意諸情根以此常流轉而無能動者法性本無生示現而有生是中無能現亦無所現物若實若不實若妄若非妄世間出世間但有假言說文殊問財首菩薩佛子一切衆生非衆生云何如來隨其時命身行解言論心樂方便思惟觀察各有隨其於如是衆生中為現其身教化調伏財首以偈答曰分別觀內身此中誰是我若能如是解彼達我有無文殊問寶首菩薩一切衆生等有四大無我無我所云何而有受苦受樂端醜內外現報後報然法界中無美無惡寶首以偈曰譬如淨明鏡隨其所對質現像各不同業性亦如是亦如胎藏中諸根悉成就體相無來處業性亦如是亦如地獄中種種諸苦事彼悉無所從業性亦如是文殊問德首菩薩言如來所悟唯是一法云何乃說無量諸法現無量剎化無量衆演音示身知心現通震界等皆云無量德首偈答譬如火性一能燒一切物火焰無分別諸佛法如是海波風吹雨地亦如是又如地界一能生種種芽非地有殊異諸佛法如是文殊問目首菩薩言如來福田等一無異云何而見衆生布施果報不同所謂種種色形家根財主眷屬官位功德智慧皆云種種如來於彼其心平等無異思惟目首偈答譬如大地一隨種各生芽於彼無冤親佛福田亦然亦如水一味因器有差別亦如淨明鏡隨色而現像如阿伽陀藥能療一切病下二句大同文殊問勤首菩薩言佛教是一衆生得見云何不即斷一切煩惱然其五陰三界三毒無有差別是則佛教於諸衆生或有利益或無利益答曰由進怠不同而令種種文殊問法首菩薩如佛所說若有衆生受持正法悉能斷除一切煩惱何故復有受持正法而不斷者隨諸煩惱法首答曰如人水所漂懼溺而渴死於法不修行多聞亦如是如人設美膳自餓而不食如人善方藥自疾不能救如人數他寶自無半錢分如人生王宮而受餒與寒如聾奏音樂悅彼不自聞如盲繢衆像示彼不自見下二句竝同文殊問智首菩薩於佛法中以智為首如來何故或讚施戒乃至智慧及以四無量心然終無有唯以一法能成菩提智首偈答佛知衆生心性分各不同隨其所應度如治而說法慳者為讚施等諸法文殊問普賢菩薩諸佛唯以一道而得出離云何今見佛土不同賢首偈答文殊法常爾法王唯一法一切無礙人一道出生死一切諸佛身唯是一法身一心一智慧力無畏亦然一切諸佛剎莊嚴悉圓滿隨衆生行異如是見不同佛剎無分別無憎亦無愛但隨衆生心如是見有殊十首次問文殊言我等說已仁者當說如來所有境界何等是佛境界因度入智法說知證現廣皆如初句文殊亦以十偈答如來深境界其量等虛空一切衆生入而實無所入如來深境界所有勝妙因億劫常宣說亦復不能盡餘九皆以究竟無差別答由是答故娑婆十方盡虛空界以佛神力故悉皆明見十種差別所謂法差別業世間身根受生持戒果犯戒果國土果下九句同初淨行品十一卷十四雖善其趣非行不前去俗進道故名為淨淨彼行故行假茲淨彼此俱得淨行之號智首問文殊言佛子云何得無過失身語意業不害不可毀不壞不退轉不可動殊勝清淨無染智為先導具如初句云何得生處具足種族家色相念慧行無畏覺悟皆云具足云何得勝慧第一最上最勝無量無數不思議無與等不可量不可說皆云慧云何得因力欲力方便力緣力所緣力根力觀察力奢摩他力毗鉢舍那力思惟力及十種善巧七覺六度經具列十七覺加空無相無願六度加慈悲喜捨佛十力八部守護云何得與衆生為依救歸趣炬明照導勝導普導如初句云何於一切衆生中為第一大勝最勝妙極妙上無上無等無等等加為文殊告智首菩薩言為欲饒益世間天人問如是義若諸菩薩善用其心則獲一切勝妙功德於諸佛法心無所礙住去來今諸佛之道隨衆生住恆不捨離當如普賢色像第一一切行願皆得具足而為衆生第二導師皆由發此一切大願始從居家入僧伽藍修行諸儀皆發大願偈云菩薩在家當願衆生下二十一偈第二句同知家性空免其逼迫孝事父母善事於佛護養一切妻子集會怨親平等永離貪著若得五欲拔除欲箭究竟安隱伎樂聚會以法自娛了伎非實結跏趺坐善根堅固得不動地若舉於足出生死海具衆善法整衣束帶檢束善根不令散失大小便時棄貪瞋癡蠲除罪法洗滌形穢清淨調柔畢竟無垢以水洗面得淨法門永無垢染見修園圃五欲圃中耘除愛草見歡樂人常得安樂樂供養佛見苦樂人獲根本智滅除衆苦見疾病人知身空寂離乖諍法若見沙門調柔寂靜畢竟第一若飯食時禪悅為食法喜充滿洗浴身體身心無垢內外光潔盛暑炎毒捨離衆惱一切皆盡若洗足時具神足力所行無礙以時寢息身得安隱心無動亂睡眠始寤一切智覺周顧十方若諸菩薩如是用心則獲一切勝妙功德賢首品十二卷同盡十五賢位之初故云賢首即是初住近方便也聖中之賢故名為賢賢家之首故名賢首爾時文殊說無濁亂清淨行大功德已欲顯示菩提心功德故以偈問賢首菩薩曰我今已為諸菩薩說佛往修清淨行仁亦當於此會中演暢修行勝功德賢首乃說七百一十五行七言偈答初一句誡云善哉仁者應諦聽次十五句歎菩提心自謙云彼諸功德不可量我今隨力說少分猶如大海一滴水次二句標發心因緣云菩薩發意求菩提非是無因無有緣次九行正明發心因緣以三寶菩提衆生國土以為所緣能信之心以為自因偈云於佛法僧生敬信以是而生廣大心不求五欲及王位富饒自樂大名稱但為永滅衆生苦利益世間而發心常欲利益諸衆生莊嚴國土供養佛受持正法修諸智證菩提故而發心次信為道元下十四行歎信心勝妙次若常下廣歎發心從始至終諸行相生以至果用次廣述因果諸用第三會忉利天宮說六品三卷升須彌山頂品十三卷十六不動而升赴機得處爾時如來威神力故十方一切世界一一四天下閻浮提中悉見如來坐菩提樹爾時如來不離此座升須彌山向帝釋殿爾時帝釋遙見佛來以佛神力莊嚴此殿置即子座諸供養具一一莊嚴及所圍繞皆有十千皆稱善來請佛入殿佛即受請十方皆然以佛力故殿中所有樂音自息帝釋自憶過去佛所種諸善根而說二十偈以歎十佛謂過去七佛等一一皆云是故此處最吉祥十方世界亦復如是世尊坐已此殿忽然廣博寬容十方世界亦復如是須彌山頂偈讚品十四卷同既登山已欲說法性還依法性以歎於人人勝法尊投心有在爾時十方各有一大菩薩各與佛剎微塵數菩薩俱從百億佛剎塵數世界外來文列十慧菩薩法慧為首各列彼十界及界中十佛各各化作毗盧遮那師子之座各坐其上十方各集亦復如是世尊兩足放百千億妙色光明普照十方此衆皆見十慧各說十偈歎佛二一切慧偈曰假使百千劫常見於如來不依真實義而觀救世者是人取諸相增長癡惑網繫縛生死獄盲冥不見佛法性本空寂無取亦無見性空即是佛不可得思量若知一切法體性皆如是斯人則不為煩惱所染著凡夫見諸法但隨於相轉不了法無相以是不見佛三勝慧偈云了知一切法自性無所有如是解法性則見盧舍那因前五蘊故後蘊相續起於此性了知見佛難思議四功德慧偈云我昔受衆苦由我不見佛故當淨法眼觀其所應見無見即是見能見一切法於法若有見此則無所見五精進慧偈云世間言語法衆生妄分別知世皆無生乃是見世間若見見世間見則世間相如實等無異是名真見者法性本清淨如空無有相此亦無所修能見大牟尼六善慧偈曰智者說無盡此亦無所說自性無盡故得有難思盡所說無盡中無衆生可得知衆生性爾則見大名稱七智慧偈曰此人無慧眼不能得見佛有諍說生死無諍即涅槃生死及涅槃二俱不可得八真實慧偈云寧受地獄苦得聞諸佛名不受無量樂而不聞佛名現在非和合去來亦復然一切法無相是則佛真體若能如是觀諸法甚深義則見一切佛法身真實相知以一故衆知以衆故一諸法無所依但從和合起九無上慧偈云如來光普照除滅衆暗冥是光非有照亦復非無照此中無有二亦復無有一大智善見者如理巧安住無中無有二無二亦復無三界一切空是則諸佛見十住品十五卷同正說真位此十居初初安聖境故名為住智斷相應且略云十爾時法慧承佛神力入菩薩無量方便三昧以三昧力十方各千佛剎微塵數世界之外有千佛剎微塵數諸佛同名法慧普現其前告法慧言善哉善哉汝能入是三昧千剎塵佛共加於汝又是遮那往昔願力及汝所修善根力故入此三昧令汝說法為增長佛智故深入法界故善了衆生界故所入無礙故所行無障故得無等方便故入一切智性故覺一切法故知一切根故能持說一切法故所謂發起諸菩薩十種住是時諸佛即與法慧無礙等十種智十方諸佛申手摩頂法慧定起告諸菩薩言佛子菩薩住處廣大與法界虛空等列十名已初釋初住云此菩薩緣十種難得法而發於心所謂十力應勸學十法所謂勤供養佛樂住生死主導世間令除惡業以勝妙法常行教誨歎無上法學佛功德生諸佛前恆蒙攝受方便演說寂諍三昧讚歎遠離生死輪回為苦衆生作歸依處治地住中發十種心修行住中行十種觀生貴住中成就十法具足方便住十法利生正心住聞十種法心定不動不退住聞十種法堅固不退童真住住十種業王子住善知十法灌頂住成就十智一一住中各勤修十法十方所說文句義理無有增減梵行品十六卷十七重述聖因因秪是行故名為行行體離染故名為梵正念天子白法慧言一切世界諸菩薩衆依如來教染衣出家云何而得修習梵行法慧言應以十法而為所緣所謂三業及佛法僧戒如是一一觀察皆空寂故知佛法平等故具一切佛法故名為清淨梵行復應修十種力一一力中有無量義悉應咨問聞已應起大慈悲心觀察衆生思惟諸法無有休息不求果報了知境界如幻化等於諸法中不生二解一切佛法疾得現前初發心時即得阿耨菩提知一切法即心自性成就慧身不由他悟發心功德品十七卷同舉劣顯勝以初例後此位所開名之為發所開之體故總云心心之勝能故云功德爾時帝釋白法慧言發心功德其量幾何答言此義甚深難知難說難分別難信解難證難行難思惟難度量難趣入雖然我承佛力而為汝說假使有人供養十阿僧祇世界衆生以一切樂具住於一劫然後教令淨持五戒得福多不答言甚多法慧言比發心功德百分千分乃至優波尼沙陀分亦不及一如是供養百劫已令持十善經千劫已令住四禪百千劫已令住四無量心經億劫已令住四無色定經百億劫已令住初果經千億劫已令住二果經百千億劫已令住三果經那由他億劫已令住四果經百千那由他億劫已令住支佛問答如前法慧言比發心功德百分乃至優波尼沙陀分不及其一何以故一切諸佛發心不為如是等故為佛種不斷故乃至第十知一切佛境界平等故發菩提心又云且置前喻假使有人於一念頃過東方阿僧祇世界如是盡阿僧祇劫此諸世界無有能知其際者第二人於一念頃過前人所經世界如是經於阿僧祇劫乃至第十人乃至十方如是世界可知其際發心功德不知其際何以故不為住爾所世界但為了知十方世界麁世界即妙世界妙世界即麁世界仰覆大小廣狹一多淨穢相即亦爾一切世界一毛端中一切世界中一毛端一體性一世界中出生一切一切無性一念知一切廣大世界故發菩提心又云菩薩不為知十方一切劫成壞故為知成壞劫盡無餘故所謂長短劫平等一多有佛無佛一佛多佛有量無量有盡無盡一念與不可說不可說與一念一切劫與非劫等平等亦爾為欲一念中盡知三際世界成壞劫故發菩提心欲知衆生種種差別等亦復如是皆以如前十方十人為喻供養十方諸佛喻亦如前度衆生喻亦如是發心所緣是所觀境境具三諦無性空一切假平等中明法品十八卷十八重歎所得故云明法明謂所證法則方法依方有契故云明法爾時精進慧菩薩白法慧言初發心菩薩成就如是大功德三世佛攝受決定至菩提於佛教中云何修習使願行滿足衆生得度紹三寶種法慧言如是問者同於如來我承佛力為說少分菩薩發心應離十種放逸得十種清淨復修十法令諸佛歡喜又修十法令速入諸地具足如是大功德已漸入佛地是菩薩於一念中悉遍知一切諸法唯除如來無能勝者無見頂者文中廣列諸佛功德歎此菩薩又云成就三世如來智第四會夜摩天宮說四品三卷升夜摩天品十九卷十九同升須彌品爾時如來威神力故十方世界一一四天下南洲及須彌皆見如來處衆說法莫不自謂皆對於佛餘大同前須彌頂夜摩偈讚品二十卷同同須彌讚爾時佛神力故十方各一大菩薩各與佛剎微塵數菩薩俱餘大如前但菩薩中以功德林為首十林為異佛名號集會等皆同一一林各以十偈歎佛第六精進林菩薩偈云衆生非衆生二俱無真實如是諸法性實義俱非有生亦名法性七力林菩薩云分別此諸蘊其性本空寂空故不可滅此是無生義衆生既如是諸佛亦復然佛及諸佛法自性無所有八行林菩薩云身亦非是佛佛亦非是身但以法為身通達一切法若能見佛身清淨如法性此人於佛法一切無疑惑若見一切法本性如涅槃是則見如來究竟無所住九覺林菩薩云譬如工畫師分布諸彩色虛妄取異色大種無差別大種中無色色中無大種亦不離大種而有色可得心中無彩畫彩畫中無心然不離於心有彩畫可得彼心恆不住無量難思議示現一切色各各不相知譬如工畫師不能知自心而由心故畫諸法性如是心如工畫師能畫諸世間五蘊悉從生無法而不造如心佛亦爾如佛衆生然應知佛與心體性皆無盡若人知心行普造諸世間是人則見佛了佛真實性心不住於身身亦不住心而能作佛事自在未曾有若人欲了知三世一切佛應觀法界性一切唯心造十智林菩薩云所取不可取所見不可見所聞不可聞一心不思議有量及無量二俱不可取若有人欲取畢竟無所得譬如隨意珠能現一切色無色而現色諸佛亦如是又如淨虛空非色不可見雖現一切色無能見空者諸佛亦如是普現無量色非心所行處一切莫能覩十行品二十一卷同依真修習故名為行無差而差故置林稱爾時功德林菩薩承佛神力入菩薩善思惟三昧入已十方各過萬佛剎微塵數世界諸佛皆號功德林而現其前告功德林十方諸佛同加於汝餘如前及列釋十名行相初歡喜行為大施主為護衆生習諸佛行廣釋事施如是行施利益衆生而無我想但觀法界衆生界無邊際法空法無所有法無相法無體法無處法無依法無作法作是觀時不見受施財物果報次觀三世一切衆生身皆滅壞為說平等不壞法性二饒益行護持淨戒廣釋事戒復作是念我當隨順一切如來具諸佛法住無上平等處等觀衆生三無違逆行安住佛法了身空寂無我我所若苦若樂皆無所有攝受衆生趣向涅槃四無屈撓行修諸精進於一切世界中令諸衆生究竟涅槃五離癡亂行成就正念最上清淨善知音聲生住滅相心不惑亂三昧增廣六善現行能知三業皆無所有善巧方便現無生相成熟調伏教化衆生十行品卷二十第七無著行廣明念念入阿僧祇世界嚴淨阿僧祇世界詣佛承事等皆云僧祇如是菩薩深入法界住於佛住說無所說一一毛端處盡未來劫修菩薩行入於法界而無所著遍於法界行菩薩行八難得行此菩薩成就難得善根難伏最勝不可壞無能過不可思議無盡自在力大威德與一切佛同一性皆云善根深入衆生界如法界無有二相無有增減以一切法法界無二故教化衆生不說一法以法界中無有一法向諸乘故諸法無二無不二故譬如虛空求不可得然非無虛空九善法行得陀羅尼大悲堅固普攝衆生於一切世界變身金色妙音具足而作佛事十真實行展轉深妙到一切佛法海實相源底十無盡藏品二十二卷二十一行相寬博故云無盡含攝不資故云藏也爾時功德林菩薩告諸菩薩言有十無盡藏三世諸佛已說今說當說謂信藏戒慚愧聞施慧念持辨一一皆十信謂信一切法空無相無願無作無分別無所依不可量無有上難超越無生如初句如是信已聞十種不思議心不怯弱所謂聞佛法不思議心不怯弱一切佛法界衆生界虛空界涅槃界過去未來現在入一切劫如初句何以故此菩薩堅信智無邊無盡故心不退轉故戒藏亦十所謂普饒益戒不受不住無悔恨無違諍不損惱無雜穢無貪求無過失無毀犯文中廣釋慚無始惡愧現世惡聞謂廣知因緣四諦三乘等施有十所謂分減施竭盡施內施外施內外施一切過現未究竟分減者凡有所食施於身中八萬戶蟲竭盡者乃至盡命內謂身分外謂外財內外謂二俱一切者己身妻子乃至七寶輪王位過去者如過去佛菩薩所行我亦如是未來亦然現在者聞四天王乃至色究竟二乘位聞已不著究竟者聞有所須經阿僧祇劫令菩薩身不具不生悔心但觀身中種子乃至究竟不淨慧者所謂如實知四諦因緣謂於五陰一一陰了知四諦十二支支支四諦三乘一一皆了四諦如云知聲聞知聲聞法知聲聞集知聲聞涅槃皆如實知以不可壞故念謂念過去不可說生念不可說佛名號念不可說佛出世念不可說修多羅乃至論議念不可說衆會演法根性煩惱三昧持謂持諸佛所說修多羅餘如念中說辨謂為衆生說如上念持經於不可說劫第五會兜率天宮說三品十二卷升兜率品二十三卷二十二大旨同前夜摩品爾時佛神力故十方一切世界一一四天下餘如前供具衆集倍於前兜率偈讚品二十四卷二十三大旨同前金剛幢菩薩下同云色身非是佛音聲亦復然亦不離色聲見佛神通力衆生及諸法了達皆無礙普現衆色像遍於一切剎堅固幢云何有智慧人於佛得見聞不修清淨願履佛所行道勇猛幢云如人獲寶藏永離貧窮苦菩薩得佛法離垢心清淨設於無數劫財寶施於佛不知佛實相此亦不名施譬如虛空界不生亦不滅諸佛法如是畢竟無生滅光明幢云了法性空寂如幻而生起所行無有盡導師如是現三世一切佛法身悉清淨隨其所應化普現妙色身智幢云一切國土中普現無量身其身不在處亦不住於法譬如淨滿月普現一切水影像雖無量本月未曾二如是無礙智成就等正覺普現一切剎佛體亦無二星宿幢云衆生妄分別是佛是世界了達法性者無佛無世界法幢云若有諸衆生未發菩提心一得聞佛名決定成菩提若有智慧人一念發道心必成無上尊慎莫生疑惑如來自在力無量劫難遇若生一念信速證無上道設於念念中供養無量佛未知真實法不名為供養雖盡未來際遍遊諸佛剎不求此妙法終不成菩提十回向品二十五卷同趣理漸極故名回向堅固難動義之如幢爾時金剛幢菩薩入智光三昧各過十方十萬佛剎微塵數世界外有十萬佛剎塵佛同號金剛幢餘如前列十回向名釋初救護衆生回向具行六度四無量等回此善根饒益衆生令至究竟永離衆苦令得一切智以入一切法平等性故等視衆生如日天子出現世間不以乾闥婆城阿修羅手閻浮提樹崇巖邃谷塵霧煙雲等物之所覆障隱而不現二十四卷二不壞回向發一念心求一切智得不壞信心常回向出世之道積集善根得法實相具菩薩行於一切相皆無所著明見真實善巧回向三等一切佛回向順三世佛回向之道善巧方便永拔一切取著根本四至一切處回向修諸善根功德之力至一切處普遍開示普攝衆生稱可佛心等二十五卷五無盡功德藏回向懺除業障所起善根回向莊嚴一切佛土無有分別等得十無盡藏六隨順堅固一切善根回向此菩薩或為帝王臨御大國威德廣被靡不歸順發號施令悉依正法周行率土於法自在見者咸伏不刑不罰感德從化以四攝法攝諸衆生具足修行一切布施二十六卷止二十八卷廣說施願偈云了達諸法真實性而於法性無分別知法無性無分別此人善入諸佛智法性遍在一切處一切衆生及國土三世悉在無有餘亦無形相而可得二十九卷七隨順一切衆生回向積集善根普施衆生成滿佛智三十卷八真如相回向智常觀察一切衆生心恆憶念善根境界以等真如平等善根回向衆生無有休息卷三十一九無著無縛解脫回向以此心成就普賢行願大回向心卷三十二十等法界無量回向廣行法施起大慈悲安立衆生於菩提心常行饒益長養善根平等回向皆如法界卷三十三菩薩於一切佛剎中一方一處一毛端量皆有無邊不可說菩薩成就智慧充滿而住盡虛空界皆悉如是皆以同體善根回向故第六會他化自在天宮說一品六卷十地品二十六卷三十四生成深廣故立地名該攝事理故名為藏權實俱實真俗咸真爾時世尊在他化自在天宮與大菩薩衆俱其諸菩薩不退菩提從他方來集住一切菩薩智所住境入如來智所入處十方各過十億佛剎微塵數世界外各有十億佛剎塵佛同名金剛藏而現其前讚金剛藏菩薩乃能入是智光三昧如向諸佛共加於汝餘如前兜率品十方諸佛與其身智各申手摩頂金剛藏菩薩從三昧起普告諸菩薩衆佛子諸菩薩願善決定無雜不可見廣大如法界究竟若虛空盡未來際一切佛剎救護衆生為佛所護入三世佛智地列十地已默然解脫月三請諸大菩薩同聲共請世尊眉間出清淨光名菩薩力焰明百千阿僧祇光明以為眷屬遍照十方息諸惡趣照佛衆會一切諸佛所加說法菩薩之身作是事已於上空中成大光明雲網臺而住欲令大衆增淨信故而說偈說已廣讚地上功德佛子住此歡喜地念諸佛故生歡喜心念佛法故念諸菩薩故念菩薩行故念清淨諸波羅蜜故念諸菩薩地殊勝故念菩薩力不可壞故念如來教化衆生故能令衆生得利益故念一切如來智方便故如初句復作是念我轉離一切世間境界故親近一切佛故遠離凡夫地故近智慧地故永斷惡趣故與衆生作依止故見一切如來故生佛境界中故入一切菩薩平等性中故遠離一切怖畏毛竪等事故亦如初句何以故此菩薩離五怖畏故於一一法皆云廣大如法界等卷三十五菩薩起十種深心入第二離垢地性自遠離一切殺生有命之者生慈念心等乃至上上十善證十力四無畏一切佛法又云殺生之罪墮於地獄畜生餓鬼若生人中得二種報一者短命二者多病以願力故見多百千億那由他佛作轉輪王三發光地得無量神力以一身為多身多身為一身作三十三天王卷三十六四焰慧地修諸觀行作須夜摩天王五難勝地利益衆生示現世間伎藝算數文字方藥吉凶休咎咸善觀察一無錯謬漸令安住無上佛法多作兜率陀天王卷三十七六現前地恆以大悲不捨衆生般若波羅蜜現前名無障礙智光明多作善化天王七遠行地功用行滿智慧自在雖行實際而不作證多為自在天王卷三十八八不動地得無功用法深入如來所行境界於無量國土修菩薩行多作大梵天王九善慧地起四無礙辨於無量佛所演說法音周遍法界多作二千世界主大梵王卷三十九十法雲地神通智慧說不可盡此地菩薩以自願力起大悲雲震大法雷通明無畏以為電光福德智慧而為密雲現種種身周旋往反於一念頃遍微塵國演大法摧魔怨霔甘露雨滅除一切衆惑塵焰能現無量自在神力大衆聞此墮在疑網時金剛藏入一切佛國土體性三昧大衆自見在金剛藏身內大千世界莊嚴之事說不能盡又見菩提樹高廣嚴好等現已還令各在本處住此地菩薩多作摩醯首羅天王
